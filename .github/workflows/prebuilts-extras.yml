name: Prebuilts Extras Release

on:
  push:
    branches:
      - "prebuilts-extras-*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  artifact-metadata: write
  id-token: write

concurrency:
  group: prebuilts-extras-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Mount bazel caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-repo
          key: prebuilts-extras-bazel-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            prebuilts-extras-bazel-${{ runner.os }}

      - name: Build and package prebuilts
        id: build_and_package
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: bash .github/workflows/prebuilts-extras.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-extra-prebuilts-${{ steps.build_and_package.outputs.version }}
          path: release/*

      - name: Attest release artifacts
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: |
            release/*.tar.zst
            release/SHA256.txt

      - name: Normalize attestation bundle filename
        run: |
          mv \
            "${{ steps.attest.outputs.bundle-path }}" \
            "release/toolchain-extra-prebuilts-${{ steps.build_and_package.outputs.version }}.attestation.jsonl"

      - name: Upload attestation bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-extra-prebuilts-${{ steps.build_and_package.outputs.version }}.attestation
          path: release/toolchain-extra-prebuilts-${{ steps.build_and_package.outputs.version }}.attestation.jsonl
          if-no-files-found: error

      - name: Publish release
        # TODO(cerisier): Revert me to @v2 once they fixed make_latest broken behavior starting at v2.5.0.
        uses: softprops/action-gh-release@v2.4.2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Toolchain extra prebuilts ${{ steps.build_and_package.outputs.version }}
          files: |
            release/*.tar.zst
            release/SHA256.txt
            release/*.attestation.jsonl
          overwrite_files: false
          draft: false
          prerelease: false
          generate_release_notes: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
